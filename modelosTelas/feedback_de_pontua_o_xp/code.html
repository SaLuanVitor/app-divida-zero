<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Feedback de Pontuação XP</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#f48c25",
                "background-light": "#f8f7f5",
                "background-dark": "#221910",
                },
                fontFamily: {
                "display": ["Manrope", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased">
<!-- Main Container -->
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Sucesso</h2>
</div>
<!-- Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6 -mt-10">
<!-- Hero Illustration -->
<div class="@container w-full max-w-[280px] aspect-square relative mb-8">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl animate-pulse"></div>
<div class="w-full h-full bg-center bg-contain bg-no-repeat relative z-10 drop-shadow-xl" data-alt="3D golden coin medal with star floating upwards" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBqWmEyz-v8Yy46xY7KJiiM2c7oSmjZ25SiQj5u5AfKuBf2b1mJlp_kZGH1inH58EPo3yEfxzHV6Ie4v85RC3Zk2KyJiZFt8SABIoSxjl1-QlvWNg3V_ChhnjfrpC3V5fCpGuFXn2uvqnVGTvGmSUGOx9BXX3fMPwuKE_NnG2IlPE_0HdA16Bux7FqX_Ttr2yPI2UCVS8zBt4IOGRHu6f1RBYIgq6zIXTeCFAnbg-WV9D4P8E7MRPQeMRtyUv1LRCuXHbqqUadEbBs");'>
</div>
</div>
<!-- Text Content -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-extrabold leading-tight text-center mb-2">
                Lançamento Realizado!
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-medium leading-normal text-center mb-8 max-w-xs">
                Você está cada vez mais perto de zerar suas dívidas! Continue assim.
            </p>
<!-- XP Card -->
<div class="w-full bg-white dark:bg-[#2c2219] rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 mb-8 transform transition-transform hover:scale-[1.02]">
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-sm tracking-widest uppercase mb-1">Recompensa</span>
<h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 mb-4 flex items-center gap-2">
                        +50 <span class="text-lg font-bold text-slate-500 dark:text-slate-400">XP</span>
</h2>
<!-- Progress Bar Section -->
<div class="w-full space-y-2">
<div class="flex justify-between text-xs font-semibold text-slate-500 dark:text-slate-400">
<span>Nível 4</span>
<span>450/500 XP</span>
</div>
<div class="h-3 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-orange-400 rounded-full" style="width: 90%"></div>
</div>
<p class="text-xs text-center text-slate-400 dark:text-slate-500 pt-1">Faltam apenas 50 XP para o próximo nível!</p>
</div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="p-6 pb-8 bg-background-light dark:bg-background-dark w-full">
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center w-full h-14 bg-primary hover:bg-orange-600 text-white font-bold text-lg rounded-xl shadow-lg shadow-orange-500/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined mr-2">add_circle</span>
                    Novo Registro
                </button>
<button class="flex items-center justify-center w-full h-14 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-lg rounded-xl transition-all active:scale-[0.98]">
                    Voltar ao Início
                </button>
</div>
</div>
</div>
</body></html>
