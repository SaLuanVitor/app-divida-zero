<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dívida Zero - Recuperar Senha</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Voltar" class="flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 text-slate-900 dark:text-white">
                Recuperar Senha
            </h2>
</div>
<!-- Hero / Illustration Area -->
<div class="flex flex-col items-center justify-center pt-8 pb-4 px-6">
<div class="mb-6 flex h-24 w-24 items-center justify-center rounded-full bg-primary/10 dark:bg-primary/20 text-primary">
<span class="material-symbols-outlined text-5xl">lock_reset</span>
</div>
<h1 class="tracking-tight text-3xl font-extrabold leading-tight text-center text-slate-900 dark:text-white mb-3">
                Esqueceu sua senha?
            </h1>
<p class="text-base font-normal leading-relaxed text-center text-slate-600 dark:text-slate-400 max-w-xs">
                Não se preocupe! Insira o e-mail associado à sua conta Dívida Zero e enviaremos as instruções para redefinir sua senha.
            </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6 px-6 py-6" onsubmit="event.preventDefault()">
<label class="flex flex-col gap-2">
<span class="text-base font-bold leading-normal text-slate-900 dark:text-white ml-1">E-mail</span>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-4 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-base font-normal leading-normal text-slate-900 dark:text-white transition-all shadow-sm" placeholder="seu@email.com" required="" type="email"/>
</div>
</label>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 mt-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-orange-600 text-white text-base font-bold leading-normal tracking-[0.015em] transition-colors shadow-lg shadow-orange-500/20 active:scale-[0.98]">
<span class="truncate">Enviar Instruções</span>
</button>
<div class="text-center pt-4">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Lembrou sua senha? 
                        <a class="font-bold text-primary hover:text-orange-600 transition-colors ml-1" href="#">
                            Voltar ao Login
                        </a>
</p>
</div>
</div>
</form>
<div class="flex-1"></div>
<!-- Bottom Decoration (Gamification hint) -->
<div class="h-2 w-full bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</body></html>
