services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_divida_zero_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_divida_zero_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/api_divida_zero
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      PORT: 3000
      RAILS_MAX_THREADS: 5
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_divida_zero_development
      POSTGRES_TEST_DB: app_divida_zero_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3000:3000"
    volumes:
      - ./backend/api_divida_zero:/rails
      - bundle_cache:/usr/local/bundle
    command: >
      bash -lc "bundle exec rails db:prepare &&
      bundle exec rails server -b 0.0.0.0 -p 3000"

volumes:
  postgres_data:
  bundle_cache:
