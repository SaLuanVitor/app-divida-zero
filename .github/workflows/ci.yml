name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  charset:
    name: Charset (UTF-8 / Mojibake)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check charset integrity
        run: node scripts/check-mojibake.js

  backend:
    name: Backend (Rails)
    needs: charset
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_divida_zero_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_divida_zero_development"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      RAILS_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_divida_zero_development
      POSTGRES_TEST_DB: app_divida_zero_test
    defaults:
      run:
        working-directory: backend/api_divida_zero

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: backend/api_divida_zero

      - name: Ensure Rails bin executables
        run: chmod +x bin/rails bin/rake bin/setup bin/dev bin/docker-entrypoint

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run tests
        run: bin/rails test

  mobile:
    name: Mobile (Jest + Typecheck)
    needs: charset
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --runInBand
